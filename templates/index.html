<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCGrab — SoundCloud Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sc: #ff5500;
  --sc2: #ff7733;
  --sc-glow: rgba(255,85,0,0.2);
  --bg: #0d0d0d;
  --card: #161616;
  --card2: #1f1f1f;
  --border: #2b2b2b;
  --text: #f2f2f2;
  --muted: #666;
  --green: #1ed760;
  --red: #ff4444;
  --yellow: #ffd60a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 0 0 80px;
  overflow-x: hidden;
}

/* ── HERO HEADER ── */
.hero {
  background: linear-gradient(135deg, #1a0800 0%, #0d0d0d 60%);
  border-bottom: 1px solid var(--border);
  padding: 48px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(255,85,0,0.15) 0%, transparent 70%);
  pointer-events: none;
}

/* Animated waveform bars in hero */
.wave-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  height: 40px;
  margin-bottom: 24px;
}
.wbar {
  width: 4px;
  background: var(--sc);
  border-radius: 2px;
  opacity: 0.7;
  animation: wv 1.2s ease-in-out infinite;
}
.wbar:nth-child(1)  { height: 12px; animation-delay: 0s; }
.wbar:nth-child(2)  { height: 28px; animation-delay: .1s; }
.wbar:nth-child(3)  { height: 20px; animation-delay: .2s; }
.wbar:nth-child(4)  { height: 36px; animation-delay: .3s; }
.wbar:nth-child(5)  { height: 16px; animation-delay: .4s; }
.wbar:nth-child(6)  { height: 40px; animation-delay: .5s; }
.wbar:nth-child(7)  { height: 22px; animation-delay: .6s; }
.wbar:nth-child(8)  { height: 30px; animation-delay: .7s; }
.wbar:nth-child(9)  { height: 14px; animation-delay: .8s; }
.wbar:nth-child(10) { height: 26px; animation-delay: .9s; }
.wbar:nth-child(11) { height: 38px; animation-delay: .5s; }
.wbar:nth-child(12) { height: 18px; animation-delay: .3s; }
.wbar:nth-child(13) { height: 32px; animation-delay: .1s; }

@keyframes wv {
  0%,100% { transform: scaleY(1); }
  50%      { transform: scaleY(0.3); }
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: clamp(48px, 10vw, 80px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -2px;
  background: linear-gradient(135deg, #ff5500, #ff9944);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(255,85,0,0.4));
}

.logo em {
  font-style: normal;
  -webkit-text-fill-color: var(--text);
  filter: none;
}

.tagline {
  font-size: 14px;
  color: var(--muted);
  margin-top: 10px;
  letter-spacing: 0.5px;
}

/* ── MAIN CONTENT ── */
.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ── SEARCH CARD ── */
.search-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-top: -1px;
  margin-top: 32px;
  animation: fadeUp .5s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.url-row {
  display: flex;
  gap: 10px;
}

.url-input {
  flex: 1;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 14px 18px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.url-input:focus {
  border-color: var(--sc);
  box-shadow: 0 0 0 3px var(--sc-glow);
}
.url-input::placeholder { color: var(--muted); }

.fetch-btn {
  background: var(--sc);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 14px 24px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, transform .1s, box-shadow .2s;
  letter-spacing: .5px;
}
.fetch-btn:hover { background: var(--sc2); box-shadow: 0 4px 20px var(--sc-glow); transform: translateY(-1px); }
.fetch-btn:active { transform: translateY(0); }
.fetch-btn:disabled { background: var(--card2); color: var(--muted); cursor:not-allowed; transform:none; box-shadow:none; }

.opts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}

.opt-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sc);
  margin-bottom: 6px;
}

.sel-wrap { position: relative; }
.sel-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 11px;
  pointer-events: none;
}

select {
  width: 100%;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 11px 32px 11px 14px;
  outline: none;
  appearance: none;
  cursor: pointer;
  transition: border-color .2s;
}
select:focus { border-color: var(--sc); }

/* ── LOADING ── */
#loading {
  display: none;
  text-align: center;
  padding: 40px 0;
  animation: fadeUp .3s ease both;
}

.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--sc);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { color: var(--muted); font-size: 14px; }

/* ── PLAYLIST PANEL ── */
#playlist-panel { display: none; margin-top: 28px; animation: fadeUp .4s ease both; }

.playlist-header {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 20px;
  border-bottom: none;
}

.playlist-thumb {
  width: 64px; height: 64px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--card2);
}

.playlist-thumb-placeholder {
  width: 64px; height: 64px;
  border-radius: 8px;
  background: var(--card2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}

.playlist-meta { flex: 1; min-width: 0; }
.playlist-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.playlist-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

.dl-all-btn {
  background: var(--sc);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 18px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, transform .1s;
  letter-spacing: .5px;
}
.dl-all-btn:hover { background: var(--sc2); transform: translateY(-1px); }

/* Track list */
.track-list {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0 0 16px 16px;
  overflow: hidden;
}

.track-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.track-item:last-child { border-bottom: none; }
.track-item:hover { background: var(--card2); }

.track-num {
  width: 28px;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.track-thumb {
  width: 42px; height: 42px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--card2);
}

.track-thumb-placeholder {
  width: 42px; height: 42px;
  border-radius: 6px;
  background: var(--card2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.track-info { flex: 1; min-width: 0; }
.track-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

.track-dur {
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
  min-width: 36px;
  text-align: right;
}

.track-dl-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 16px;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color .15s, color .15s, background .15s;
}
.track-dl-btn:hover { border-color: var(--sc); color: var(--sc); background: var(--sc-glow); }

/* ── DOWNLOAD PROGRESS ── */
#dl-progress {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-top: 24px;
  animation: fadeUp .3s ease both;
}

.progress-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.prog-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--sc);
  animation: pulse 1s ease infinite;
  flex-shrink: 0;
}
.prog-dot.done  { background: var(--green); animation: none; }
.prog-dot.error { background: var(--red);   animation: none; }

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.6); }
}

.prog-label {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}

.prog-pct {
  font-size: 14px;
  font-weight: 700;
  color: var(--sc);
  min-width: 40px;
  text-align: right;
}

.prog-track { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sc), var(--sc2));
  border-radius: 3px;
  transition: width .5s ease;
  box-shadow: 0 0 10px var(--sc-glow);
}

.prog-file {
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Done files */
#done-files { display: none; margin-top: 20px; }

.done-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 12px;
}

.done-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  animation: fadeUp .3s ease both;
}

.done-icon { font-size: 16px; flex-shrink: 0; }
.done-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.save-btn {
  background: none;
  border: 1.5px solid var(--sc);
  border-radius: 6px;
  color: var(--sc);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, color .15s;
}
.save-btn:hover { background: var(--sc); color: #fff; }

.zip-btn {
  width: 100%;
  padding: 14px;
  background: rgba(255,85,0,0.1);
  border: 1.5px solid var(--sc);
  border-radius: 10px;
  color: var(--sc);
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .5px;
  cursor: pointer;
  margin-top: 10px;
  transition: background .15s, color .15s;
}
.zip-btn:hover { background: var(--sc); color: #fff; }

.error-box {
  background: rgba(255,68,68,0.08);
  border: 1px solid rgba(255,68,68,0.3);
  border-radius: 8px;
  padding: 14px;
  font-size: 13px;
  color: var(--red);
  margin-top: 14px;
  line-height: 1.5;
}

/* ── BUY ME A COFFEE ── */
.bmc-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--yellow);
  border-radius: 50px;
  padding: 12px 18px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #1a1a00;
  box-shadow: 0 4px 20px rgba(255,214,10,0.35);
  transition: transform .2s, box-shadow .2s;
  animation: fadeUp .6s .5s ease both;
}
.bmc-fab:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 8px 28px rgba(255,214,10,0.45);
}
.bmc-fab .bmc-icon { font-size: 18px; }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 40px 20px 20px;
  font-size: 12px;
  color: var(--muted);
}
footer a { color: var(--sc); text-decoration: none; }
</style>
</head>
<body>

<div style="position: absolute; top: 20px; right: 24px; font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 1px; z-index: 100;">Made by Alexander Roper</div>

<!-- Hero -->
<div class="hero">
  <div class="wave-row">
    <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div>
  </div>
  <div class="logo">SC<em>Grab</em></div>
  <div class="tagline">Download SoundCloud playlists &amp; tracks instantly</div>
</div>

<div class="container">

  <!-- Search card -->
  <div class="search-card">
    <div class="url-row">
      <input class="url-input" id="url" type="text"
        placeholder="Paste a SoundCloud URL — track or playlist…"
        autocomplete="off">
      <button class="fetch-btn" id="fetch-btn" onclick="fetchPlaylist()">Load →</button>
    </div>
    <input type="hidden" id="format" value="mp3">
    <input type="hidden" id="quality" value="192">
  </div>

  <!-- Progress -->
  <div id="dl-progress">
    <div class="progress-top">
      <div class="prog-dot" id="prog-dot"></div>
      <div class="prog-label" id="prog-label">Preparing download…</div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="prog-file" id="prog-file"></div>
    <div id="error-box-wrap"></div>
  </div>

  <!-- Playlist panel -->
  <div id="playlist-panel">
    <div class="playlist-header">
      <div id="playlist-thumb-wrap"></div>
      <div class="playlist-meta">
        <div class="playlist-title" id="playlist-title"></div>
        <div class="playlist-sub" id="playlist-sub"></div>
      </div>
      <button class="dl-all-btn" id="dl-all-btn" onclick="downloadAll()">⬇ Download All</button>
    </div>
    <div class="track-list" id="track-list"></div>
  </div>

  <!-- Done files -->
  <div id="done-files">
    <div class="done-title">✓ Ready to save</div>
    <div id="done-container"></div>
  </div>

</div>

<!-- Buy Me a Coffee FAB -->
<a class="bmc-fab" href="https://buymeacoffee.com/zillioncart" target="_blank" rel="noopener">
  <span class="bmc-icon">☕</span> Buy me a coffee
</a>

<footer>
  Files auto-delete after 10 min &nbsp;·&nbsp; Personal use only &nbsp;·&nbsp;
  Powered by <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a>
</footer>

<script>
let playlistData = null;
let currentJobId = null;
let pollInterval = null;

// ── Helpers ──────────────────────────────────────────────────────────────
function fmtDur(secs) {
  if (!secs) return '';
  const m = Math.floor(secs / 60);
  const s = String(Math.floor(secs % 60)).padStart(2, '0');
  return `${m}:${s}`;
}

function thumbEl(url, size, isPlaylist) {
  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.className = isPlaylist ? 'playlist-thumb' : 'track-thumb';
    img.onerror = () => img.replaceWith(placeholderEl(isPlaylist));
    return img;
  }
  return placeholderEl(isPlaylist);
}

function placeholderEl(isPlaylist) {
  const d = document.createElement('div');
  d.className = isPlaylist ? 'playlist-thumb-placeholder' : 'track-thumb-placeholder';
  d.textContent = '🎵';
  return d;
}

// ── Fetch playlist ────────────────────────────────────────────────────────
async function fetchPlaylist() {
  const url = document.getElementById('url').value.trim();
  if (!url) { shake(document.getElementById('url')); return; }

  document.getElementById('fetch-btn').disabled = true;
  document.getElementById('playlist-panel').style.display = 'none';
  document.getElementById('dl-progress').style.display = 'none';
  document.getElementById('done-files').style.display = 'none';
  
  // Use progress UI for fetching metadata since it can take time
  clearInterval(pollInterval);
  const prog = document.getElementById('dl-progress');
  prog.style.display = 'block';
  prog.scrollIntoView({behavior: 'smooth', block: 'nearest'});
  document.getElementById('error-box-wrap').innerHTML = '';
  setProgress('loading', `Fetching metadata...`, 0, 'This might take a minute for large playlists');

  try {
    const res = await fetch('/api/fetch-playlist', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    
    if (data.error) {
      showError(data.error);
      document.getElementById('fetch-btn').disabled = false;
      return;
    }

    currentJobId = data.job_id;
    pollInterval = setInterval(pollStatus, 1000);
  } catch(e) {
    showError('Network error: ' + e.message);
    document.getElementById('fetch-btn').disabled = false;
  }
}

function renderPlaylist(data) {
  // Header
  document.getElementById('playlist-title').textContent = data.title;
  document.getElementById('playlist-sub').textContent =
    `${data.uploader ? data.uploader + ' · ' : ''}${data.count} track${data.count !== 1 ? 's' : ''}`;

  const thumbWrap = document.getElementById('playlist-thumb-wrap');
  thumbWrap.innerHTML = '';
  thumbWrap.appendChild(thumbEl(data.thumbnail, 64, true));

  // Hide "Download All" button if single track
  document.getElementById('dl-all-btn').style.display = data.count > 1 ? '' : 'none';

  // Track list
  const list = document.getElementById('track-list');
  list.innerHTML = '';

  data.tracks.forEach((track, i) => {
    const item = document.createElement('div');
    item.className = 'track-item';
    item.innerHTML = `<div class="track-num">${i + 1}</div>`;
    item.appendChild(thumbEl(track.thumbnail, 42, false));

    const info = document.createElement('div');
    info.className = 'track-info';
    info.innerHTML = `<div class="track-title">${escHtml(track.title)}</div>
      <div class="track-artist">${escHtml(track.uploader || '')}</div>`;
    item.appendChild(info);

    if (track.duration) {
      const dur = document.createElement('div');
      dur.className = 'track-dur';
      dur.textContent = fmtDur(track.duration);
      item.appendChild(dur);
    }

    const btn = document.createElement('button');
    btn.className = 'track-dl-btn';
    btn.title = 'Download this track';
    btn.textContent = '⬇';
    btn.onclick = () => downloadTracks([track.url], `Track ${i+1}`);
    item.appendChild(btn);

    list.appendChild(item);
  });

  document.getElementById('playlist-panel').style.display = 'block';
}

// ── Download ──────────────────────────────────────────────────────────────
function downloadAll() {
  if (!playlistData) return;
  const url = document.getElementById('url').value.trim();
  downloadTracks([url], 'Full playlist');
}

async function downloadTracks(urls, label) {
  const fmt = document.getElementById('format').value;
  const quality = document.getElementById('quality').value;

  // Reset progress UI
  clearInterval(pollInterval);
  const prog = document.getElementById('dl-progress');
  prog.style.display = 'block';
  prog.scrollIntoView({behavior: 'smooth', block: 'nearest'});
  document.getElementById('done-files').style.display = 'none';
  document.getElementById('done-container').innerHTML = '';
  document.getElementById('error-box-wrap').innerHTML = '';
  setProgress('loading', `Starting: ${label}`, 0, '');

  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({urls, format: fmt, quality})
    });
    const data = await res.json();
    if (data.error) { setProgress('error', data.error, 0, ''); return; }
    currentJobId = data.job_id;
    pollInterval = setInterval(pollStatus, 1200);
  } catch(e) {
    setProgress('error', 'Network error: ' + e.message, 0, '');
  }
}

async function pollStatus() {
  try {
    const res = await fetch(`/api/status/${currentJobId}`);
    const data = await res.json();

    if (data.error && !data.status) {
      clearInterval(pollInterval);
      setProgress('error', data.error, 0, '');
      document.getElementById('fetch-btn').disabled = false;
      document.getElementById('dl-btn').disabled = false;
      return;
    }

    if (data.type === 'info') {
      if (data.status === 'downloading') {
        // Still fetching info
        setProgress('loading', `Fetching metadata...`, 50, 'This might take a minute for large playlists');
      } else if (data.status === 'done') {
        clearInterval(pollInterval);
        document.getElementById('dl-progress').style.display = 'none';
        playlistData = data.playlist_data;
        renderPlaylist(playlistData);
        document.getElementById('fetch-btn').disabled = false;
      } else if (data.status === 'error') {
        clearInterval(pollInterval);
        setProgress('error', data.error || 'Unknown error', 0, '');
        document.getElementById('fetch-btn').disabled = false;
      }
      return;
    }

    if (data.status === 'downloading') {
      setProgress('loading', `Downloading… (${data.file_names.length > 0 ? data.file_names.length + ' done' : 'starting'})`, data.progress, data.current_file);

    } else if (data.status === 'done') {
      clearInterval(pollInterval);
      setProgress('done', 'Download complete!', 100, '');
      showDoneFiles(data.file_names, data.has_zip);

    } else if (data.status === 'error') {
      clearInterval(pollInterval);
      setProgress('error', data.error || 'Unknown error', 0, '');
    }
  } catch(e) {
    clearInterval(pollInterval);
    setProgress('error', 'Lost connection to server', 0, '');
  }
}

function setProgress(state, label, pct, file) {
  const dot = document.getElementById('prog-dot');
  dot.className = 'prog-dot' + (state === 'done' ? ' done' : state === 'error' ? ' error' : '');
  document.getElementById('prog-label').textContent = label;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-file').textContent = file ? `↓ ${file}` : '';

  if (state === 'error') {
    const wrap = document.getElementById('error-box-wrap');
    wrap.innerHTML = `<div class="error-box">${escHtml(label)}</div>`;
  }
}

function showDoneFiles(names, hasZip) {
  const container = document.getElementById('done-container');
  const panel = document.getElementById('done-files');
  container.innerHTML = '';
  panel.style.display = 'block';
  panel.scrollIntoView({behavior: 'smooth', block: 'nearest'});

  names.forEach((name, i) => {
    const item = document.createElement('div');
    item.className = 'done-item';
    item.innerHTML = `<span class="done-icon">🎵</span>
      <span class="done-name" title="${escHtml(name)}">${escHtml(name)}</span>
      <button class="save-btn" onclick="dlFile(${i})">Save</button>`;
    container.appendChild(item);
  });

  if (hasZip && names.length > 1) {
    const zipBtn = document.createElement('button');
    zipBtn.className = 'zip-btn';
    zipBtn.textContent = '⬇ Download All as ZIP';
    zipBtn.onclick = dlZip;
    container.appendChild(zipBtn);
  }
}

function dlFile(i) { window.location.href = `/api/download-file/${currentJobId}/${i}`; }
function dlZip()   { window.location.href = `/api/download-zip/${currentJobId}`; }

// ── Misc ──────────────────────────────────────────────────────────────────
function showError(msg) {
  const prog = document.getElementById('dl-progress');
  prog.style.display = 'block';
  setProgress('error', msg, 0, '');
}

function shake(el) {
  el.style.borderColor = 'var(--red)';
  setTimeout(() => { el.style.borderColor = ''; }, 900);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('url').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchPlaylist();
});
</script>
